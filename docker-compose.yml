services:

  # ── Banco de Dados ───────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: aluguel-carros-db
    environment:
      POSTGRES_DB: aluguel_carros
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d aluguel_carros"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aluguel-net

  # ── Backend (API REST) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aluguel-carros-api
    environment:
      MICRONAUT_ENVIRONMENTS: prod
      DB_URL: jdbc:postgresql://postgres:5432/aluguel_carros
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aluguel-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aluguel-carros-ui
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aluguel-net

volumes:
  postgres_data:

networks:
  aluguel-net:
    driver: bridge

# ──────────────────────────────────────────────────────────────
# COMO RODAR (produção completa com Docker):
#
#   docker compose up --build
#
#   → Frontend: http://localhost
#   → API:      http://localhost:8080
#   → Swagger:  http://localhost:8080/swagger-ui
#
# Variáveis de ambiente opcionais (.env na raiz):
#   DB_USER=postgres
#   DB_PASSWORD=minhasenha
# ──────────────────────────────────────────────────────────────
