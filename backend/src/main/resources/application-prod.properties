# ── Perfil: produção (PostgreSQL) ────────────────────────────
# Ativado via variável de ambiente: MICRONAUT_ENVIRONMENTS=prod
# Usado automaticamente pelo docker-compose (serviço backend).

# ── Banco de dados ───────────────────────────────────────────
datasources.default.db-type=postgres
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.url=${DB_URL:`jdbc:postgresql://postgres:5432/aluguel_carros`}
datasources.default.username=${DB_USER:`postgres`}
datasources.default.password=${DB_PASSWORD:`postgres`}
datasources.default.maximum-pool-size=10

# ── JPA / Hibernate ──────────────────────────────────────────
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=false
jpa.default.properties.hibernate.format_sql=false

# ── Servidor ─────────────────────────────────────────────────
micronaut.server.port=8080
