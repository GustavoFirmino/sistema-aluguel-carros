micronaut.application.name=aluguelcarros

# ── Banco de dados (dev: H2 em memória) ──────────────────
datasources.default.url=jdbc:h2:mem:testdb
datasources.default.driver-class-name=org.h2.Driver
datasources.default.username=sa
datasources.default.password=

# ── Banco de dados (prod: PostgreSQL via Docker) ─────────
# Comente as linhas H2 acima e descomente abaixo para usar PostgreSQL:
#datasources.default.db-type=postgres
#datasources.default.driver-class-name=org.postgresql.Driver
#datasources.default.url=jdbc:postgresql://localhost:5432/aluguel_carros
#datasources.default.username=postgres
#datasources.default.password=postgres

# ── JPA / Hibernate ──────────────────────────────────────
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=true
jpa.default.properties.hibernate.format_sql=true

# ── CORS (libera o frontend React em dev) ────────────────
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origin-regex=http://localhost:\\d+
micronaut.server.cors.configurations.web.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
micronaut.server.cors.configurations.web.allowed-headers=Content-Type,Authorization,Accept
micronaut.server.cors.configurations.web.max-age=3600

# ── OpenAPI / Swagger ────────────────────────────────────
micronaut.router.static-resources.jsonschema.mapping=/schemas/**
micronaut.router.static-resources.jsonschema.paths=classpath\:META-INF/schemas

