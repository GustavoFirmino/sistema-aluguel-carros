micronaut.application.name=aluguelcarros

# ── CORS (libera o frontend React em dev) ────────────────────
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origin-regex=http://localhost:\\d+
micronaut.server.cors.configurations.web.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
micronaut.server.cors.configurations.web.allowed-headers=Content-Type,Authorization,Accept
micronaut.server.cors.configurations.web.max-age=3600

# ── OpenAPI / Swagger UI ─────────────────────────────────────
micronaut.openapi.views.spec.enabled=true
micronaut.openapi.views.spec.rapidoc.enabled=true
micronaut.openapi.views.spec.swagger-ui.enabled=true
micronaut.openapi.views.spec.swagger-ui.theme=flattop

micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**
micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/swagger/views/swagger-ui
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui/**
micronaut.router.static-resources.rapidoc.paths=classpath:META-INF/swagger/views/rapidoc
micronaut.router.static-resources.rapidoc.mapping=/rapidoc/**
micronaut.router.static-resources.jsonschema.mapping=/schemas/**
micronaut.router.static-resources.jsonschema.paths=classpath:META-INF/schemas
